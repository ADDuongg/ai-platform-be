openapi: 3.0.3
info:
  title: Kids Fashion Style Analysis Workflow Contract
  version: 1.0.0
  description: |
    Milestone 2 — Style Analysis Workflow (`kids-fashion-style-analysis`).

    **No new REST routes.** Clients use existing Workflow Execution APIs
    (`specs/005-workflow-execution/contracts/executions-api.yaml`).

    This document specifies:
    - Execution input shape for this Workflow
    - Shared Context handoff keys after a completed run
    - Seeded catalog codes (Workflow / Agents / Prompts)

servers:
  - url: /api/v1
    description: Platform API base

tags:
  - name: StyleAnalysis
    description: Conventions for kids-fashion-style-analysis Execution

paths:
  /workflows/{id}/execute:
    post:
      tags: [StyleAnalysis]
      summary: Start Kids Fashion Style Analysis Execution
      description: |
        Same endpoint as Execution module. When `id` is the published Workflow
        `kids-fashion-style-analysis`, request `input` MUST include non-blank
        `season`, `category`, and `market` (enforced via `policies.requiredInputs`).
        Optional Reference Image keys enrich analysis when present.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of published Workflow kids-fashion-style-analysis
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteStyleAnalysisRequest'
            examples:
              standalone:
                summary: Sample SS27 kids apparel VN
                value:
                  input:
                    season: SS27
                    category: kids-apparel
                    market: VN
                    ageBand: '3-8'
                    constraints: playful colors; school-friendly
              withReferenceHandoff:
                summary: With inspirationBoard enrichment
                value:
                  input:
                    season: SS27
                    category: kids-apparel
                    market: VN
                    inspirationBoard:
                      summary: Inspiration set for kids-apparel SS27 in VN
                      groups: [{ group: Playful color blocking, items: [] }]
                      references: []
                      notes: []
      responses:
        '201':
          description: Execution created
        '400':
          description: Missing or blank required input fields
        '401': { description: Unauthenticated }
        '403': { description: Forbidden }
        '404': { description: Workflow not found or not published }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ExecuteStyleAnalysisRequest:
      type: object
      required: [input]
      properties:
        input:
          $ref: '#/components/schemas/StyleAnalysisInput'

    StyleAnalysisInput:
      type: object
      required: [season, category, market]
      properties:
        season: { type: string, example: SS27 }
        category: { type: string, example: kids-apparel }
        market: { type: string, example: VN }
        ageBand: { type: string }
        constraints: { type: string }
        inspirationBoard: { type: object, additionalProperties: true }
        groupedReferences:
          type: array
          items: { type: object, additionalProperties: true }
        imageCandidates:
          type: array
          items: { type: object, additionalProperties: true }

    LabeledNote:
      type: object
      required: [label]
      properties:
        label: { type: string }
        notes: { type: string }

    AnalysisIntermediate:
      type: object
      required: [summary, findings]
      properties:
        summary: { type: string }
        findings:
          type: array
          items: { $ref: '#/components/schemas/LabeledNote' }

    StyleReport:
      type: object
      required:
        - summary
        - colors
        - styles
        - patterns
        - illustrationNotes
        - recommendations
      properties:
        summary: { type: string }
        colors:
          type: array
          items: { $ref: '#/components/schemas/LabeledNote' }
        styles:
          type: array
          items: { $ref: '#/components/schemas/LabeledNote' }
        patterns:
          type: array
          items: { $ref: '#/components/schemas/LabeledNote' }
        illustrationNotes:
          type: array
          items: { $ref: '#/components/schemas/LabeledNote' }
        recommendations:
          type: array
          items: { $ref: '#/components/schemas/LabeledNote' }

  examples:
    SeededCatalogCodes:
      summary: Seeded codes for Style Analysis
      value:
        workflowCode: kids-fashion-style-analysis
        agentCodes:
          - fashion-color-analyzer
          - fashion-style-analyzer
          - fashion-pattern-analyzer
          - fashion-illustration-analyzer
        promptCodes:
          - fashion-color-analyzer-prompt
          - fashion-style-analyzer-prompt
          - fashion-pattern-analyzer-prompt
          - fashion-illustration-analyzer-prompt
        contextKeys:
          intermediate: [colorAnalysis, styleAnalysis, patternAnalysis]
          output: [styleReport]
