openapi: 3.0.3
info:
  title: AI Platform — Agent Registry API
  version: 1.0.0
  description: >
    Agent catalog registry for Phase 1. Admins mutate; non-admins read published Agents only.
    FE typed contracts: `types.ts`, `interfaces.ts` (`AgentsApiClient`).
    Runtime responses wrapped as `{ success, data, meta }` / `{ success: false, error, timestamp, path }`.
servers:
  - url: /api/v1
tags:
  - name: Agents
paths:
  /agents:
    get:
      tags: [Agents]
      summary: List Agents
      operationId: listAgents
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/AgentStatus'
          description: Admins may filter any status; non-admins always constrained to published
        - name: capabilityType
          in: query
          schema:
            $ref: '#/components/schemas/CapabilityType'
        - name: enabled
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paginated agent list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Agents]
      summary: Register draft Agent
      operationId: createAgent
      security:
        - bearerAuth: []
      description: Requires `agents:create`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentRequest'
      responses:
        '201':
          description: Draft agent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /agents/{id}:
    get:
      tags: [Agents]
      summary: Get Agent by id
      operationId: getAgent
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Agents]
      summary: Update Agent metadata or draft version config
      operationId: updateAgent
      security:
        - bearerAuth: []
      description: Requires `agents:update`. Published version config is immutable.
      parameters:
        - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentRequest'
      responses:
        '200':
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Agents]
      summary: Soft-delete (archive) Agent
      operationId: deleteAgent
      security:
        - bearerAuth: []
      description: Requires `agents:delete`
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /agents/{id}/publish:
    post:
      tags: [Agents]
      summary: Publish current draft version
      operationId: publishAgent
      security:
        - bearerAuth: []
      description: Requires `agents:publish`
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /agents/{id}/enable:
    post:
      tags: [Agents]
      summary: Enable Agent (`enabled=true`)
      operationId: enableAgent
      security:
        - bearerAuth: []
      description: Requires `agents:update`
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /agents/{id}/disable:
    post:
      tags: [Agents]
      summary: Disable Agent (`enabled=false`)
      operationId: disableAgent
      security:
        - bearerAuth: []
      description: Requires `agents:update`. Does not change lifecycle status.
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /agents/{id}/versions:
    get:
      tags: [Agents]
      summary: List Agent versions
      operationId: listAgentVersions
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Version list (non-admins see published versions only)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentVersionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Agents]
      summary: Create new draft version from current published
      operationId: createAgentVersion
      security:
        - bearerAuth: []
      description: Requires `agents:update`. Agent status stays published.
      parameters:
        - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentVersionRequest'
      responses:
        '201':
          description: Draft version created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentVersionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /agents/{id}/versions/{version}:
    get:
      tags: [Agents]
      summary: Get specific Agent version
      operationId: getAgentVersion
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AgentId'
        - name: version
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Version detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentVersionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    AgentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    AgentStatus:
      type: string
      enum: [draft, published, archived]
    AgentVersionStatus:
      type: string
      enum: [draft, published]
    CapabilityType:
      type: string
      enum:
        - research
        - image_search
        - analysis
        - generation
        - review
        - translation
        - custom
    CreateAgentRequest:
      type: object
      required: [code, name, capabilityType, inputSchema, outputSchema]
      properties:
        code:
          type: string
          maxLength: 64
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
        name:
          type: string
          maxLength: 120
        description:
          type: string
        capabilityType:
          $ref: '#/components/schemas/CapabilityType'
        inputSchema:
          type: object
          additionalProperties: true
        outputSchema:
          type: object
          additionalProperties: true
        config:
          type: object
          additionalProperties: true
        timeoutMs:
          type: integer
          minimum: 1
        maxRetries:
          type: integer
          minimum: 0
        promptRef:
          type: string
          nullable: true
        toolRefs:
          type: array
          items:
            type: string
        changelog:
          type: string
    UpdateAgentRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 120
        description:
          type: string
        capabilityType:
          $ref: '#/components/schemas/CapabilityType'
        inputSchema:
          type: object
          additionalProperties: true
        outputSchema:
          type: object
          additionalProperties: true
        config:
          type: object
          additionalProperties: true
        timeoutMs:
          type: integer
          minimum: 1
        maxRetries:
          type: integer
          minimum: 0
        promptRef:
          type: string
          nullable: true
        toolRefs:
          type: array
          items:
            type: string
        changelog:
          type: string
    CreateAgentVersionRequest:
      type: object
      properties:
        changelog:
          type: string
    AgentVersionSummary:
      type: object
      properties:
        version:
          type: integer
        status:
          $ref: '#/components/schemas/AgentVersionStatus'
        publishedAt:
          type: string
          format: date-time
          nullable: true
    AgentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        capabilityType:
          $ref: '#/components/schemas/CapabilityType'
        status:
          $ref: '#/components/schemas/AgentStatus'
        enabled:
          type: boolean
        currentVersion:
          type: integer
          nullable: true
        draftVersion:
          type: integer
          nullable: true
          description: Present for admins when a parallel draft version exists
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AgentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AgentResponse'
        meta:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
    AgentVersionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agentId:
          type: string
          format: uuid
        version:
          type: integer
        status:
          $ref: '#/components/schemas/AgentVersionStatus'
        inputSchema:
          type: object
          additionalProperties: true
        outputSchema:
          type: object
          additionalProperties: true
        config:
          type: object
          additionalProperties: true
        timeoutMs:
          type: integer
          nullable: true
        maxRetries:
          type: integer
          nullable: true
        promptRef:
          type: string
          nullable: true
        toolRefs:
          type: array
          items:
            type: string
        changelog:
          type: string
          nullable: true
        publishedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
    AgentVersionListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AgentVersionResponse'
    MessageResponse:
      type: object
      properties:
        message:
          type: string
  responses:
    BadRequest:
      description: Validation error
    Unauthorized:
      description: Missing/invalid credentials (401)
    Forbidden:
      description: Authenticated but missing permission (403)
    NotFound:
      description: Resource not found (also used to hide drafts from non-admins)
    Conflict:
      description: Duplicate code, immutable version, or draft version already exists
