services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_platform
      POSTGRES_PASSWORD: ai_platform_secret
      POSTGRES_DB: ai_platform
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ai_platform -d ai_platform']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ai-platform-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: ai-platform-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ai-platform.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # Production app — start with: docker compose --profile app up -d
  app:
    profiles: ['app']
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-platform-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      APP_NAME: ai-platform-be
      APP_VERSION: 1.0.0
      APP_PORT: 3000
      APP_URL: http://localhost:3000
      API_PREFIX: api
      API_VERSION: 1
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ai_platform
      DB_PASSWORD: ai_platform_secret
      DB_DATABASE: ai_platform
      DB_SCHEMA: public
      DB_SSL: 'false'
      DB_LOGGING: 'false'
      DB_SYNCHRONIZE: 'false'
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      REDIS_DB: 0
      REDIS_KEY_PREFIX: 'ai-platform:'
      JWT_SECRET: change-me-in-production-use-a-long-random-string-at-least-32-chars
      JWT_ACCESS_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 60
      CORS_ORIGINS: http://localhost:3000
      LOG_LEVEL: info
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
